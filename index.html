<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本語 — Nihongo</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/textures.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/responsive.css">

  <style>
    .dashboard-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 16px 100px;
    }
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background-color: var(--color-surface);
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 2px solid var(--color-border);
    }
    .top-nav h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.3rem;
      margin: 0;
      flex: 1;
      text-align: center;
    }
    .nav-actions {
      display: flex;
      gap: 8px;
      min-width: 60px;
      justify-content: flex-end;
    }
    .nav-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      color: var(--color-text-secondary);
    }
    .nav-btn:hover { background: rgba(0,0,0,0.05); }

    .welcome {
      text-align: center;
      padding: 40px 0 8px;
    }
    .welcome h2 {
      font-family: 'Shippori Mincho', serif;
      font-size: 3rem;
      margin-bottom: 8px;
      color: var(--color-text);
    }
    .welcome p {
      color: var(--color-text-secondary);
      font-size: 1.05rem;
      margin: 0;
    }

    .journey-section {
      margin: 28px 0;
    }
    .journey-section h3 {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.15rem;
      margin-bottom: 10px;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }
    .progress-info .pct {
      color: var(--color-accent);
      font-weight: 700;
    }
    .pbar {
      height: 10px;
      background: var(--color-border);
      border-radius: 5px;
      overflow: hidden;
    }
    .pbar-fill {
      height: 100%;
      background: var(--color-accent);
      border-radius: 5px;
      transition: width 0.5s ease;
    }

    .levels-title {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.15rem;
      margin: 32px 0 14px;
    }
    .level-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .level-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .level-card.unlocked {
      cursor: pointer;
    }
    .level-card.unlocked:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }
    .level-card.locked {
      opacity: 0.55;
    }
    .level-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 44px;
    }
    .level-num {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--color-gold);
      line-height: 1;
    }
    .level-icon {
      font-size: 1.2rem;
      margin-top: 3px;
    }
    .level-info {
      flex: 1;
      min-width: 0;
    }
    .level-title {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .level-subtitle {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
    }
    .level-desc {
      font-size: 0.78rem;
      color: var(--color-text-secondary);
      margin-top: 4px;
      line-height: 1.4;
    }
    .level-status {
      flex-shrink: 0;
      text-align: center;
      min-width: 50px;
    }
    .status-lock { font-size: 1.4rem; }
    .status-score {
      font-size: 1.1rem;
      font-weight: 700;
    }
    .status-label {
      font-size: 0.7rem;
      margin-top: 2px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      background-color: var(--color-surface);
      z-index: 20;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
      border-top: 1px solid var(--color-border);
    }
    .bottom-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-decoration: none;
      padding: 4px 16px;
      border-radius: 8px;
      font-size: 0.7rem;
    }
    .bottom-nav a .nav-kanji {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.2rem;
    }
    .bottom-nav a.active {
      color: var(--color-accent);
      font-weight: 700;
    }
    .bottom-nav a:not(.active) {
      color: var(--color-text-secondary);
    }
  </style>
</head>
<body class="paper-bg">

  <!-- Top Navigation -->
  <nav class="top-nav">
    <div style="min-width:60px;"></div>
    <h1>日本語</h1>
    <div class="nav-actions">
      <button class="nav-btn" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
      <a href="settings.html" class="nav-btn" aria-label="Settings">⚙</a>
    </div>
  </nav>

  <div class="dashboard-container">
    <!-- Welcome -->
    <div class="welcome">
      <h2>日本語</h2>
      <p>Start learning Japanese</p>
    </div>

    <!-- Progress -->
    <div class="journey-section">
      <h3>Your Journey</h3>
      <div class="progress-info">
        <span id="progress-text">0 of 9 levels completed</span>
        <span class="pct" id="progress-pct">0%</span>
      </div>
      <div class="pbar">
        <div class="pbar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Levels -->
    <h3 class="levels-title">Levels</h3>
    <div class="level-list" id="level-list"></div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="active">
      <span class="nav-kanji">家</span>
      <span>Home</span>
    </a>
    <a href="flashcards.html?mode=review">
      <span class="nav-kanji">復習</span>
      <span>Review</span>
    </a>
    <a href="settings.html">
      <span class="nav-kanji">設定</span>
      <span>Settings</span>
    </a>
  </nav>

  <script>
    // ---- Inline storage/progress logic (no modules needed) ----
    var STORAGE_KEY = 'nihongo_progress';
    var SETTINGS_KEY = 'nihongo_settings';

    function getProgress() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        var defaults = getDefaultProgress();
        if (!raw) return defaults;
        var parsed = JSON.parse(raw);
        return {
          levels: Object.assign({}, defaults.levels, parsed.levels || {}),
          srs: parsed.srs || {},
          quizHistory: parsed.quizHistory || []
        };
      } catch(e) { return getDefaultProgress(); }
    }

    function getDefaultProgress() {
      var levels = {};
      for (var i = 1; i <= 9; i++) {
        levels[i] = { unlocked: true, bestScore: 0, attempts: 0, completed: false };
      }
      return { levels: levels, srs: {}, quizHistory: [] };
    }

    function getSettings() {
      try {
        var raw = localStorage.getItem(SETTINGS_KEY);
        var defaults = { showRomaji: true, autoPlayAudio: true, furigana: true, darkMode: false };
        if (!raw) return defaults;
        return Object.assign(defaults, JSON.parse(raw));
      } catch(e) { return { showRomaji: true, autoPlayAudio: true, furigana: true, darkMode: false }; }
    }

    function saveSettings(s) {
      try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch(e) {}
    }

    // ---- Level data ----
    var LEVELS = [
      { id:1, title:'Hiragana Basics', titleJp:'ひらがな基礎', icon:'あ', desc:'Learn the first 25 hiragana: vowels + K, S, T, N rows.' },
      { id:2, title:'Hiragana Complete', titleJp:'ひらがな完成', icon:'が', desc:'Master remaining hiragana, dakuten, handakuten & combos.' },
      { id:3, title:'Katakana Basics', titleJp:'カタカナ基礎', icon:'ア', desc:'Learn the first 25 katakana characters.' },
      { id:4, title:'Katakana & Loanwords', titleJp:'カタカナと外来語', icon:'カ', desc:'Complete katakana plus common loanwords.' },
      { id:5, title:'Kanji: Numbers & Nature', titleJp:'漢字：数字と自然', icon:'一', desc:'Numbers 1-10, colors, and nature kanji.' },
      { id:6, title:'Kanji: Daily Life', titleJp:'漢字：日常生活', icon:'人', desc:'Kanji for people, actions, time & places.' },
      { id:7, title:'Vocabulary & Grammar', titleJp:'語彙と文法', icon:'語', desc:'Essential vocabulary and grammar patterns.' },
      { id:8, title:'Conversation Practice', titleJp:'会話練習', icon:'話', desc:'Real conversation scenarios: restaurant, shopping & more.' },
      { id:9, title:'Kanji Origins', titleJp:'漢字の成り立ち', icon:'象', desc:'See how kanji evolved from ancient pictures — visual mnemonics for easy recall.' }
    ];

    // ---- Theme ----
    var settings = getSettings();
    if (settings.darkMode) {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('theme-toggle').textContent = '☀';
    }

    document.getElementById('theme-toggle').addEventListener('click', function() {
      var s = getSettings();
      s.darkMode = !s.darkMode;
      saveSettings(s);
      if (s.darkMode) {
        document.documentElement.setAttribute('data-theme', 'dark');
        this.textContent = '☀';
      } else {
        document.documentElement.removeAttribute('data-theme');
        this.textContent = '🌙';
      }
    });

    // ---- Render progress ----
    var progress = getProgress();
    var completed = 0;
    for (var i = 1; i <= 9; i++) {
      if (progress.levels[i] && progress.levels[i].completed) completed++;
    }
    var pct = Math.round((completed / 9) * 100);
    document.getElementById('progress-text').textContent = completed + ' of 9 levels completed';
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    // ---- Render level cards ----
    var list = document.getElementById('level-list');

    LEVELS.forEach(function(level) {
      var lp = progress.levels[level.id] || { unlocked: true, bestScore: 0, attempts: 0, completed: false };
      lp.unlocked = true; // All levels are always unlocked

      var card = document.createElement('div');
      card.className = 'level-card ' + (lp.unlocked ? 'unlocked' : 'locked');

      if (lp.unlocked) {
        card.onclick = function() { window.location.href = 'level.html?id=' + level.id; };
      }

      // Status display
      var statusHtml = '';
      if (!lp.unlocked) {
        statusHtml = '<div class="level-status"><div class="status-lock">🔒</div></div>';
      } else if (lp.completed) {
        statusHtml = '<div class="level-status"><div class="status-score" style="color:var(--color-success);">' + lp.bestScore + '%</div><div class="status-label" style="color:var(--color-success);">✓ Done</div></div>';
      } else {
        statusHtml = '<div class="level-status"><div class="status-score" style="color:var(--color-accent);">' + lp.bestScore + '%</div><div class="status-label" style="color:var(--color-text-secondary);">Best</div></div>';
      }

      card.innerHTML =
        '<div class="level-badge">' +
          '<span class="level-num">' + level.id + '</span>' +
          '<span class="level-icon">' + level.icon + '</span>' +
        '</div>' +
        '<div class="level-info">' +
          '<div class="level-title">' + level.title + '</div>' +
          '<div class="level-subtitle">' + level.titleJp + '</div>' +
          '<div class="level-desc">' + level.desc + '</div>' +
        '</div>' +
        statusHtml;

      list.appendChild(card);
    });
  </script>
</body>
</html>
